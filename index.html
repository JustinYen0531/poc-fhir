<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>POC-FHIR | Point of Care</title>
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="brand-mark">⚕</span>
      <span class="brand-name">POC-FHIR</span>
      <span class="brand-sub">Point of Care</span>
    </div>
    <div class="server-config">
      <label for="server-url">FHIR 伺服器</label>
      <input id="server-url" type="text" value="https://hapi.fhir.org/baseR4" spellcheck="false" />
      <span id="server-status" class="status-dot" title="尚未連線"></span>
    </div>
  </header>

  <main class="layout">
    <!-- 左欄:病人搜尋 -->
    <aside class="panel search-panel">
      <h2>病人搜尋</h2>
      <form id="search-form" class="search-form">
        <div class="input-with-mic">
          <input id="search-input" type="text" placeholder="姓名或病人 ID…" autocomplete="off" />
          <button type="button" class="mic-btn" data-mic-target="search-input" title="語音輸入">🎤</button>
        </div>
        <button type="submit" class="btn primary">搜尋</button>
      </form>
      <div id="search-results" class="search-results">
        <p class="hint">輸入病人姓名(例如 "Smith")或 ID 進行搜尋。</p>
      </div>

      <div class="create-patient-block">
        <h3>建立新病人</h3>
        <p class="hint">由 FHIR 伺服器產生全新的病人 ID。</p>
        <form id="create-patient-form" class="create-patient-form">
          <div class="field-row">
            <label>姓氏 <input name="family" type="text" required autocomplete="family-name" /></label>
            <label>名字 <input name="given" type="text" required autocomplete="given-name" /></label>
          </div>
          <label>性別
            <select name="gender">
              <option value="unknown">不詳</option>
              <option value="male">男</option>
              <option value="female">女</option>
              <option value="other">其他</option>
            </select>
          </label>
          <label>出生日期 <input name="birthDate" type="date" /></label>
          <button type="submit" class="btn primary">建立並選取新病人</button>
        </form>
      </div>
    </aside>

    <!-- 中欄:病人資訊與臨床資料 -->
    <section class="panel patient-panel">
      <div id="patient-header" class="patient-header empty">
        <p class="hint">尚未選擇病人</p>
      </div>

      <div id="clinical-tabs" class="tabs hidden">
        <button class="tab active" data-tab="vitals">生命徵象</button>
        <button class="tab" data-tab="conditions">診斷</button>
        <button class="tab" data-tab="medications">用藥</button>
        <button class="tab" data-tab="allergies">過敏</button>
        <button class="tab" data-tab="notes">臨床紀錄</button>
      </div>

      <div id="tab-content" class="tab-content"></div>
    </section>

    <!-- 右欄:資料輸入 -->
    <aside class="panel entry-panel">
      <h2>床邊記錄</h2>

      <div class="entry-block">
        <h3>生命徵象輸入</h3>
        <form id="vitals-form" class="vitals-form">
          <h4>基本生命徵象</h4>
          <div class="field-row">
            <label>收縮壓 <input name="sbp" type="number" min="40" max="300" placeholder="mmHg" /></label>
            <label>舒張壓 <input name="dbp" type="number" min="20" max="200" placeholder="mmHg" /></label>
          </div>
          <div class="field-row">
            <label>心率 <input name="hr" type="number" min="20" max="300" placeholder="bpm" /></label>
            <label>體溫 <input name="temp" type="number" step="0.1" min="30" max="45" placeholder="°C" /></label>
          </div>
          <div class="field-row">
            <label>SpO₂ <input name="spo2" type="number" min="50" max="100" placeholder="%" /></label>
            <label>呼吸 <input name="rr" type="number" min="4" max="80" placeholder="/min" /></label>
          </div>

          <h4>疼痛、血糖與身體測量</h4>
          <div class="field-row">
            <label>疼痛分數 <input name="pain" type="number" min="0" max="10" placeholder="0–10" /></label>
            <label>血糖 <input name="glucose" type="number" min="0" max="1000" step="0.1" placeholder="mg/dL" /></label>
          </div>
          <div class="field-row">
            <label>體重 <input name="weight" type="number" min="0.5" max="500" step="0.1" placeholder="kg" /></label>
            <label>身高 <input name="height" type="number" min="20" max="260" step="0.1" placeholder="cm" /></label>
          </div>

          <h4>氧療與呼吸輔助</h4>
          <div class="field-row">
            <label>氧氣流量 <input name="oxygenFlow" type="number" min="0" max="100" step="0.1" placeholder="L/min" /></label>
            <label>FiO₂ <input name="fio2" type="number" min="21" max="100" step="0.1" placeholder="%" /></label>
          </div>
          <label>呼吸輔助方式
            <select name="respiratorySupport">
              <option value="">未記錄</option>
              <option value="室內空氣">室內空氣</option>
              <option value="鼻導管">鼻導管</option>
              <option value="簡單面罩">簡單面罩</option>
              <option value="非再吸入型面罩">非再吸入型面罩</option>
              <option value="高流量鼻導管">高流量鼻導管</option>
              <option value="非侵入性呼吸器">非侵入性呼吸器</option>
              <option value="侵入性呼吸器">侵入性呼吸器</option>
            </select>
          </label>

          <h4>神經學評估</h4>
          <label>意識狀態（AVPU）
            <select name="avpu">
              <option value="">未記錄</option>
              <option value="清醒（Alert）">清醒（Alert）</option>
              <option value="對聲音有反應（Voice）">對聲音有反應（Voice）</option>
              <option value="對疼痛有反應（Pain）">對疼痛有反應（Pain）</option>
              <option value="無反應（Unresponsive）">無反應（Unresponsive）</option>
            </select>
          </label>
          <div class="field-row gcs-row">
            <label>GCS 睜眼
              <select name="gcsEye"><option value="">—</option><option value="4">4</option><option value="3">3</option><option value="2">2</option><option value="1">1</option></select>
            </label>
            <label>GCS 語言
              <select name="gcsVerbal"><option value="">—</option><option value="5">5</option><option value="4">4</option><option value="3">3</option><option value="2">2</option><option value="1">1</option></select>
            </label>
            <label>GCS 動作
              <select name="gcsMotor"><option value="">—</option><option value="6">6</option><option value="5">5</option><option value="4">4</option><option value="3">3</option><option value="2">2</option><option value="1">1</option></select>
            </label>
          </div>
          <div class="field-row">
            <label>左瞳孔
              <select name="leftPupil"><option value="">未記錄</option><option value="正常反應">正常反應</option><option value="反應遲緩">反應遲緩</option><option value="無反應">無反應</option></select>
            </label>
            <label>右瞳孔
              <select name="rightPupil"><option value="">未記錄</option><option value="正常反應">正常反應</option><option value="反應遲緩">反應遲緩</option><option value="無反應">無反應</option></select>
            </label>
          </div>

          <h4>輸入輸出與末梢循環</h4>
          <div class="field-row">
            <label>輸入量 <input name="fluidIntake" type="number" min="0" max="50000" step="1" placeholder="mL" /></label>
            <label>尿量 <input name="urineOutput" type="number" min="0" max="50000" step="1" placeholder="mL" /></label>
          </div>
          <label>微血管回填時間
            <select name="capillaryRefill">
              <option value="">未記錄</option>
              <option value="≤ 2 秒">≤ 2 秒</option>
              <option value="> 2 秒">&gt; 2 秒</option>
            </select>
          </label>
          <button type="submit" class="btn primary" disabled>寫入 FHIR</button>
        </form>
      </div>

      <div class="entry-block">
        <h3>臨床紀錄(可語音輸入)</h3>
        <div class="voice-controls">
          <select id="voice-lang">
            <option value="zh-TW">中文(台灣)</option>
            <option value="en-US">English (US)</option>
          </select>
          <button id="note-mic" type="button" class="mic-btn large" data-mic-target="note-input" title="按住說話或點擊開始/停止">🎤 語音輸入</button>
        </div>
        <div id="voice-status" class="voice-status"></div>
        <textarea id="note-input" rows="6" placeholder="輸入或口述臨床紀錄…"></textarea>
        <button id="save-note" class="btn primary" disabled>儲存紀錄至 FHIR</button>
      </div>

      <div id="toast" class="toast hidden"></div>
    </aside>
  </main>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
